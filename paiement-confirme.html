<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Confirmation de paiement — Maison Paliquey</title>
  <meta name="robots" content="noindex, nofollow" />
  <meta name="theme-color" content="#1B2A4A" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/site.css?v=1.0.16" />
  <script src="assets/js/site.js?v=1.0.16" defer></script>
  <style>
    .confirm-card{max-width:560px;margin:0 auto;border:1px solid #E5DDD3;border-radius:20px;background:#fff;box-shadow:0 2px 16px rgba(27,42,74,.08);overflow:hidden;text-align:center}
    .confirm-card__top{padding:2.2rem 2rem 1rem}
    .confirm-icon{width:64px;height:64px;border-radius:999px;margin:0 auto 1rem;display:flex;align-items:center;justify-content:center}
    .confirm-icon svg{width:34px;height:34px}
    .ic-paid{background:#E7F1EC;color:#2D6A4F}
    .ic-wait{background:#E9F0F6;color:#1B5E8E}
    .ic-fail{background:#FDECEC;color:#B91C1C}
    .confirm-card h1{font-family:'Cormorant Garamond',Georgia,serif;font-weight:400;font-size:2rem;color:#1B2A4A;margin:.2rem 0 .4rem}
    .confirm-card p{color:#374151;line-height:1.6;margin:.3rem 0}
    .confirm-card .amount{font-family:'Cormorant Garamond',serif;font-size:1.6rem;color:#1B2A4A;font-weight:600}
    .confirm-card__foot{padding:1.2rem 2rem 2rem}
    .muted{color:#6B7280;font-size:.9rem}
    .spinner{width:34px;height:34px;border:3px solid #E5DDD3;border-top-color:#1B2A4A;border-radius:999px;animation:spin .8s linear infinite;margin:0 auto}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a href="/" class="brand" aria-label="Maison Paliquey — accueil">
        <img class="brand-mark brand-mark--img" src="assets/img/logo-mp.svg" alt="" aria-hidden="true" width="44" height="44">
        <span class="brand-name"><span>Maison Paliquey</span><span class="brand-sub">Cap Ferret</span></span>
      </a>
    </div>
  </header>

  <main class="section">
    <div class="container">
      <div class="confirm-card" data-confirm>
        <div class="confirm-card__top">
          <div class="spinner" data-loading></div>
          <h1 data-title>Vérification du paiement…</h1>
          <p class="muted" data-msg>Merci de patienter un instant.</p>
        </div>
        <div class="confirm-card__foot">
          <a href="/" class="btn btn-outline btn-sm">Retour à l'accueil</a>
        </div>
      </div>
    </div>
  </main>

  <script>
    (function () {
      var params = new URLSearchParams(location.search);
      var id = params.get("id");
      var titleEl = document.querySelector("[data-title]");
      var msgEl = document.querySelector("[data-msg]");
      var loadEl = document.querySelector("[data-loading]");
      var topEl = document.querySelector(".confirm-card__top");

      function icon(kind) {
        var paths = {
          paid: '<path d="M20 6L9 17l-5-5" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>',
          wait: '<circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="2"/><path d="M12 7v5l3 2" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>',
          fail: '<path d="M18 6L6 18M6 6l12 12" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>'
        };
        var cls = kind === "paid" ? "ic-paid" : (kind === "fail" ? "ic-fail" : "ic-wait");
        return '<div class="confirm-icon ' + cls + '"><svg viewBox="0 0 24 24">' + paths[kind] + '</svg></div>';
      }

      function render(kind, title, msg, amount) {
        loadEl.style.display = "none";
        var html = icon(kind);
        html += '<h1>' + title + '</h1>';
        if (amount) html += '<p class="amount">' + amount + '</p>';
        html += '<p>' + msg + '</p>';
        topEl.innerHTML = html;
      }

      if (!id) {
        render("fail", "Lien invalide", "Aucune référence de paiement n'a été trouvée. Si vous avez réglé, vous recevrez un email de confirmation.");
        return;
      }

      function fmt(cents) { return (cents / 100).toFixed(2).replace(".", ",") + " €"; }

      var tries = 0;
      function poll() {
        tries++;
        fetch("/api/paiement-statut?id=" + encodeURIComponent(id))
          .then(function (r) { return r.json(); })
          .then(function (d) {
            var s = d.status;
            if (s === "paid") {
              render("paid", "Paiement confirmé, merci ✓",
                "Votre linge est réservé pour les dates indiquées. Un email de confirmation vous a été envoyé. Rendez-vous en boutique pour la remise.",
                d.amount_cents ? fmt(d.amount_cents) : null);
            } else if (s === "failed" || s === "canceled" || s === "expired") {
              render("fail", "Paiement non abouti",
                "Le paiement n'a pas été finalisé. Aucun montant n'a été débité. Vous pouvez relancer une réservation depuis la page Commander.");
            } else {
              // open / pending — on retente quelques fois (le webhook peut être en cours)
              if (tries < 6) { setTimeout(poll, 1500); return; }
              render("wait", "Paiement en cours de validation",
                "Votre paiement est en cours de traitement. Vous recevrez un email dès qu'il sera confirmé.");
            }
          })
          .catch(function () {
            if (tries < 6) { setTimeout(poll, 1500); return; }
            render("wait", "Vérification impossible pour le moment",
              "Si votre paiement a été accepté, vous recevrez un email de confirmation. En cas de doute, contactez-nous.");
          });
      }
      poll();
    })();
  </script>
</body>
</html>
